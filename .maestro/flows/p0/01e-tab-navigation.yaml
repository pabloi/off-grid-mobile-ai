# P0 E2E: 20.1 All 5 tabs
# Verifies all tab bar tabs are tappable and show correct screens
# QA_TEST_PLAN §20.1

appId: ${APP_ID}
name: "P0: Tab Navigation"
tags:
  - p0
  - navigation
  - tabs
---

- launchApp

# Handle whatever screen the app lands on — get to Home
- runFlow:
    when:
      visible:
        id: "onboarding-screen"
    commands:
      - tapOn:
          id: "onboarding-skip"
      - extendedWaitUntil:
          visible:
            id: "model-download-screen"
          timeout: 20000
      - tapOn:
          id: "model-download-skip"

- runFlow:
    when:
      visible:
        id: "model-download-screen"
    commands:
      - tapOn:
          id: "model-download-skip"

# 1. Home tab
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

# 2. Chats tab
- tapOn:
    id: "chats-tab"
- extendedWaitUntil:
    visible:
      text: "Chats"
    timeout: 5000

# 3. Projects tab
- tapOn:
    id: "projects-tab"
- extendedWaitUntil:
    visible:
      text: "Projects"
    timeout: 5000

# 4. Models tab
- tapOn:
    id: "models-tab"
- extendedWaitUntil:
    visible:
      id: "models-screen"
    timeout: 5000

# 5. Settings tab
- tapOn:
    id: "settings-tab"
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000

# 6. Tap same tab repeatedly — no crash
- tapOn:
    id: "settings-tab"
- tapOn:
    id: "settings-tab"
- assertVisible:
    text: "Settings"

# Return to Home to confirm navigation still works
- tapOn:
    id: "home-tab"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 5000
