coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "src/**/index.ts"
  - "src/types/**"
  - "src/navigation/**"
  - "node_modules/**"
  - "__tests__/**"
